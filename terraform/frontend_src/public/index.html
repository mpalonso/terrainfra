<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Security Incidents</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="/config.js"></script>
  </head>
  <body>
    <h1>Security Incidents</h1>

    <section>
      <h2>Login</h2>
      <input id="u" placeholder="username" />
      <input id="p" placeholder="password" type="password" />
      <button id="loginBtn">Login</button>
      <span id="loginStatus"></span>
    </section>

    <section>
      <h2>Clientes</h2>
      <select id="clientSelect"></select>
      <button id="loadTicketsBtn">Ver tickets</button>
    </section>

    <section>
      <h2>Tickets del cliente</h2>
      <ul id="ticketsList"></ul>
    </section>

    <section>
      <h2>Incidentes</h2>
      <ul id="incidentsList"></ul>
    </section>

    <section>
      <h2>Crear ticket (requiere login)</h2>
      <label>Client ID: <input id="newClientId" /></label>
      <label>Incident ID: <input id="newIncidentId" /></label>
      <button id="createTicketBtn">Crear</button>
      <pre id="createTicketResult"></pre>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
